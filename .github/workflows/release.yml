name: Publish to NuGet

# Publishes to nuget.org via Trusted Publishing (GitHub OIDC -> short-lived key).
# No API key is stored anywhere. Trigger by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
# or run manually from the Actions tab (workflow_dispatch), which packs the
# version currently set in FluentSvg.csproj.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # required for GitHub OIDC / Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # A tag push (v1.2.3) sets the package version to 1.2.3; a manual run uses
      # whatever version is in the csproj.
      - name: Determine version
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: |
          if [ -n "${{ steps.ver.outputs.version }}" ]; then
            dotnet pack FluentSvg.csproj -c Release -o artifacts -p:Version=${{ steps.ver.outputs.version }}
          else
            dotnet pack FluentSvg.csproj -c Release -o artifacts
          fi

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org username (profile name, NOT email)

      - name: Push
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
